<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="350" height="120">
  <title>Tal-Tech Grape Icon</title>
  <desc>A landscape logo featuring a stylized cluster of purple grape spheres on the left and the text "Tal-Tech" on the right. Canvas widened to prevent text clipping.</desc>

  <defs>
    <g id="grapeBall">
      <circle cx="12" cy="12" r="12" fill="#673AB7" /> <circle cx="8" cy="8" r="4" fill="#9575CD" />  </g>
  </defs>

  <g transform="translate(20, 15)">
    <use href="#grapeBall" x="0" y="0" />
    <use href="#grapeBall" x="24" y="0" />
    <use href="#grapeBall" x="48" y="0" />
    <use href="#grapeBall" x="72" y="0" />

    <use href="#grapeBall" x="12" y="21" />
    <use href="#grapeBall" x="36" y="21" />
    <use href="#grapeBall" x="60" y="21" />

    <use href="#grapeBall" x="24" y="42" />
    <use href="#grapeBall" x="48" y="42" />

    <use href="#grapeBall" x="36" y="63" />
  </g>

  <text x="130" y="70" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="40" fill="#311B92">Tal-Tech</text>
</svg>
